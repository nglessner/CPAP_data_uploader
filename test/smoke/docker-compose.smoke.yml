# Local SMB target for the AS11 smoke fixture.
# Manual-fire bench fixture — `restart: no` so it never auto-starts on host
# reboot. Run only when actively smoke-testing the firmware.
# Dev-only credentials — do not reuse outside this fixture.
# Image is unpinned (`dperson/samba:latest`) intentionally: this is a
# pre-merge smoke, not a reproducible CI gate. If you need a deterministic
# pin later, switch to a digest reference.
#
# Bring up:  docker compose -f test/smoke/docker-compose.smoke.yml up -d
# Tear down: docker compose -f test/smoke/docker-compose.smoke.yml down
# Inspect:   ls test/smoke/.smb-share/cpap-smoke/

services:
  smoke-samba:
    image: dperson/samba:latest
    container_name: cpap-smoke-samba
    network_mode: host
    restart: no
    command: >
      -u "smoke;smokepass"
      -s "cpap-smoke;/share;yes;no;no;smoke"
      -p
      -W
    volumes:
      - ./.smb-share:/share
